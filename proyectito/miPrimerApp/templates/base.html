<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block titulo %}Mi Sitio{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background-color: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        nav {
            background-color: #1a1a1a;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            color: #f5f5f0;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav ul li a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        nav ul li a:hover {
            color: #fff;
        }

        /* ── HEADER ── */
        header {
            background-color: #2c2c2c;
            color: #f5f5f0;
            padding: 4rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #aaa;
            font-size: 1rem;
        }

        /* ── CONTENIDO PRINCIPAL ── */
        main {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── FOOTER ── */
        footer {
            background-color: #1a1a1a;
            color: #888;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        footer a {
            color: #aaa;
            text-decoration: none;
        }

        footer a:hover {
            color: #fff;
        }
    </style>
    {% block estilos %}{% endblock %}
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <a href="/" class="logo">Mi Sitio</a>
        <ul>
            <li><a href="/">Inicio</a></li>
            <li><a href="/about/">Acerca de</a></li>
            <li><a href="/contacto/">Contacto</a></li>
        </ul>
    </nav>

    <!-- HEADER -->
    <header>
        {% block header %}
        <h1>Bienvenido</h1>
        <p>Subtítulo de la página</p>
        {% endblock %}
    </header>

    <!-- CONTENIDO -->
    <main>
        {% block contenido %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer>
        {% block footer %}
        <p>© 2025 Mi Sitio &mdash; <a href="#">Política de privacidad</a></p>
        {% endblock %}
    </footer>
    <!-- Cargamos HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
